<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 244 850" width="100%" style="max-width: 244px; background-color: white; font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;">
  <style>
    /* Common Styles */
    .node-rect {
      fill: #ffffff;
      stroke: #28253D;
      stroke-width: 2px;
      filter: url(#shadow);
    }
    .node-polygon {
      fill: #ffffff;
      stroke: #28253D;
      stroke-width: 2px;
      filter: url(#shadow);
    }
    .node-text {
      font-size: 14px;
      fill: #28253D;
      text-anchor: middle;
      dominant-baseline: central;
      font-weight: 500;
    }
    .edge-path {
      fill: none;
      stroke: #28253D;
      stroke-width: 2px;
      stroke-dasharray: 4;
    }
    .label-bg {
      fill: #ffffff;
      opacity: 0.9;
    }
    .label-text {
      font-size: 12px;
      fill: #28253D;
      text-anchor: middle;
      dominant-baseline: central;
    }
  </style>

  <!-- Definitions -->
  <defs>
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <!-- Arrowhead -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28253D" />
    </marker>
  </defs>

  <!-- Edges -->
  <g id="edges">
    <!-- A -> B -->
    <path d="M122,53 V124" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- B -> C -->
    <path d="M122,169 V240" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- C -> D -->
    <path d="M122,358 V469" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- D -> E -->
    <path d="M122,514 V585" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- E -> F -->
    <path d="M122,630 V701" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- F -> G -->
    <path d="M122,746 V796" class="edge-path" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Edge Labels -->
  <g id="edge-labels">
    <!-- Parsing -->
    <g transform="translate(122, 88)">
      <rect x="-25" y="-10" width="50" height="20" class="label-bg"/>
      <text class="label-text">Parsing</text>
    </g>
    <!-- Validation -->
    <g transform="translate(122, 204)">
      <rect x="-30" y="-10" width="60" height="20" class="label-bg"/>
      <text class="label-text">Validation</text>
    </g>
    <!-- OK -->
    <g transform="translate(122, 413)">
      <rect x="-15" y="-10" width="30" height="20" class="label-bg"/>
      <text class="label-text">OK</text>
    </g>
    <!-- Reduction -->
    <g transform="translate(122, 549)">
      <rect x="-30" y="-10" width="60" height="20" class="label-bg"/>
      <text class="label-text">Reduction</text>
    </g>
    <!-- Mapping -->
    <g transform="translate(122, 665)">
      <rect x="-30" y="-10" width="60" height="20" class="label-bg"/>
      <text class="label-text">Mapping</text>
    </g>
  </g>

  <!-- Nodes -->
  <g id="nodes">
    <!-- A: Input BMS -->
    <g transform="translate(122, 30.5)">
      <rect x="-44" y="-22.5" width="88" height="45" rx="5" class="node-rect"/>
      <text y="0" class="node-text">Input BMS</text>
    </g>

    <!-- B: In-Memory Model -->
    <g transform="translate(122, 146.5)">
      <rect x="-65" y="-22.5" width="130" height="45" rx="12" class="node-rect"/>
      <text y="0" class="node-text" style="font-size: 13px;">In-Memory Model</text>
    </g>

    <!-- C: Integrity Check -->
    <g transform="translate(122, 300)">
      <polygon points="0,-60 80,0 0,60 -80,0" class="node-polygon"/>
      <text y="0" class="node-text">Integrity Check</text>
    </g>

    <!-- D: Audio Grouping -->
    <g transform="translate(122, 491.5)">
      <rect x="-72" y="-22.5" width="144" height="45" rx="5" class="node-rect"/>
      <text y="0" class="node-text">Audio Grouping</text>
    </g>

    <!-- E: Definition Simulation -->
    <g transform="translate(122, 607.5)">
      <rect x="-114" y="-22.5" width="228" height="45" rx="5" class="node-rect"/>
      <text y="0" class="node-text">Definition Simulation</text>
    </g>

    <!-- F: BMS Rewriting -->
    <g transform="translate(122, 723.5)">
      <rect x="-58" y="-22.5" width="116" height="45" rx="5" class="node-rect"/>
      <text y="0" class="node-text">BMS Rewriting</text>
    </g>

    <!-- G: Output BMS -->
    <g transform="translate(122, 818.5)">
      <rect x="-44" y="-22.5" width="88" height="45" rx="5" class="node-rect"/>
      <text y="0" class="node-text">Output BMS</text>
    </g>
  </g>
</svg>