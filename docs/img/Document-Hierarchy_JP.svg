<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 460" style="background-color: white; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;">
  <style>
    /* 共通スタイル定義 */
    .node-rect {
      fill: #ffffff;
      stroke: #28253D;
      stroke-width: 2px;
      filter: url(#shadow);
    }
    .node-title {
      font-size: 14px;
      font-weight: bold;
      fill: #28253D;
      text-anchor: middle;
      font-family: 'Arial', sans-serif; /* 英数字用フォント優先 */
    }
    .node-desc {
      font-size: 11px;
      font-weight: normal;
      fill: #555555;
      text-anchor: middle;
    }
    .edge-path {
      fill: none;
      stroke: #28253D;
      stroke-width: 2px;
      stroke-dasharray: 4;
    }
  </style>

  <!-- 定義セクション -->
  <defs>
    <!-- ドロップシャドウ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <!-- 矢印の先端 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28253D" />
    </marker>
  </defs>

  <!-- 接続線 (Edges) -->
  <g id="edges">
    <!-- README -> ARCHITECTURE -->
    <path d="M125,76 V125" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- ARCHITECTURE -> TECHNICAL -->
    <path d="M125,191 V235" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- TECHNICAL -> OPTIMIZATION -->
    <path d="M125,311 V360" class="edge-path" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ノード (Nodes) - 中心座標 x=125 -->
  <g id="nodes">
    <!-- Node A: README.md -->
    <g transform="translate(125, 43)">
      <!-- 幅160px, 高さ66px -->
      <rect x="-80" y="-33" width="160" height="66" rx="5" class="node-rect"/>
      <text x="0" y="-5" class="node-title">README.md</text>
      <text x="0" y="15" class="node-desc">概要・ユーザー向け</text>
    </g>

    <!-- Node New: ARCHITECTURE.md -->
    <g transform="translate(125, 158)">
      <!-- 幅190px, 高さ66px -->
      <rect x="-95" y="-33" width="190" height="66" rx="5" class="node-rect"/>
      <text x="0" y="-5" class="node-title">ARCHITECTURE.md</text>
      <text x="0" y="15" class="node-desc">システム構成・クラス設計</text>
    </g>

    <!-- Node B: TECHNICAL_GUIDE.md -->
    <g transform="translate(125, 273)">
      <!-- テキストが長いため幅を広げる (幅220px) -->
      <rect x="-110" y="-38" width="220" height="76" rx="5" class="node-rect"/>
      <text x="0" y="-8" class="node-title">TECHNICAL_GUIDE.md</text>
      <text x="0" y="15" class="node-desc">背景・アルゴリズム・設計思想</text>
    </g>

    <!-- Node C: OPTIMIZATION_GUIDE.md -->
    <g transform="translate(125, 398)">
      <!-- 幅200px -->
      <rect x="-100" y="-38" width="200" height="76" rx="5" class="node-rect"/>
      <text x="0" y="-8" class="node-title">OPTIMIZATION_GUIDE.md</text>
      <text x="0" y="15" class="node-desc">実装詳細・拡張方法</text>
    </g>
  </g>
</svg>