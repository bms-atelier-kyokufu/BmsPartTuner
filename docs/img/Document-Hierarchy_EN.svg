<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 480" width="100%" style="max-width: 248px; background-color: white; font-family: 'Arial', sans-serif;">
  <style>
    /* 共通スタイル定義 */
    .node-rect {
      fill: #ffffff;
      stroke: #28253D;
      stroke-width: 2px;
      filter: url(#shadow);
    }
    .node-title {
      font-size: 14px;
      font-weight: bold;
      fill: #28253D;
      text-anchor: middle;
    }
    .node-desc {
      font-size: 12px;
      font-weight: normal;
      fill: #555555;
      text-anchor: middle;
    }
    .edge-path {
      fill: none;
      stroke: #28253D;
      stroke-width: 2px;
      stroke-dasharray: 4;
    }
  </style>

  <!-- 定義セクション -->
  <defs>
    <!-- ドロップシャドウ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <!-- 矢印の先端 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#28253D" />
    </marker>
  </defs>

  <!-- 接続線 (Edges) -->
  <g id="edges">
    <!-- README -> ARCHITECTURE -->
    <path d="M124,74 V124" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- ARCHITECTURE -> TECHNICAL -->
    <path d="M124,190 V240" class="edge-path" marker-end="url(#arrowhead)"/>
    <!-- TECHNICAL -> OPTIMIZATION -->
    <path d="M124,327 V377" class="edge-path" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ノード (Nodes) -->
  <g id="nodes">
    <!-- Node A: README.md -->
    <g transform="translate(124, 41)">
      <!-- 高さ66px -->
      <rect x="-95" y="-33" width="190" height="66" rx="5" class="node-rect"/>
      <text x="0" y="-5" class="node-title">README.md</text>
      <text x="0" y="15" class="node-desc">Overview &amp; User Guide</text>
    </g>

    <!-- Node New: ARCHITECTURE.md -->
    <g transform="translate(124, 157)">
      <!-- 高さ66px -->
      <rect x="-105" y="-33" width="210" height="66" rx="5" class="node-rect"/>
      <text x="0" y="-5" class="node-title">ARCHITECTURE.md</text>
      <text x="0" y="15" class="node-desc">System Structure &amp; Class Design</text>
    </g>

    <!-- Node B: TECHNICAL_GUIDE.md -->
    <g transform="translate(124, 283.5)">
      <!-- 高さ87px -->
      <rect x="-116" y="-43.5" width="232" height="87" rx="5" class="node-rect"/>
      <text x="0" y="-10" class="node-title">TECHNICAL_GUIDE.md</text>
      <text x="0" y="15" class="node-desc">Background, Algorithms, &amp; Philosophy</text>
    </g>

    <!-- Node C: OPTIMIZATION_GUIDE.md -->
    <g transform="translate(124, 420.5)">
      <!-- 高さ87px -->
      <rect x="-116" y="-43.5" width="232" height="87" rx="5" class="node-rect"/>
      <text x="0" y="-10" class="node-title">OPTIMIZATION_GUIDE.md</text>
      <text x="0" y="15" class="node-desc">Implementation Details &amp; Internals</text>
    </g>
  </g>
</svg>